openapi: 3.1.0

info:
  title: TicTacToe Socket Server Events
  version: 1.0.0
  description: Socket.IO Server → Client 이벤트 페이로드 타입 정의

components:
  schemas:
    # 공통 (socket-server 이벤트에서 참조됨)
    PlayerData:
      $ref: "./schemas/common.yaml#/PlayerData"

    # Server → Client 이벤트
    ConnectedEvent:
      $ref: "./schemas/socket-server.yaml#/ConnectedEvent"
    RoomAssignedEvent:
      $ref: "./schemas/socket-server.yaml#/RoomAssignedEvent"
    ExistingPlayersEvent:
      $ref: "./schemas/socket-server.yaml#/ExistingPlayersEvent"
    PlayerJoinedEvent:
      $ref: "./schemas/socket-server.yaml#/PlayerJoinedEvent"
    PlayerReadyEvent:
      $ref: "./schemas/socket-server.yaml#/PlayerReadyEvent"
    ReadyTimeoutStartedEvent:
      $ref: "./schemas/socket-server.yaml#/ReadyTimeoutStartedEvent"
    ReadyTimeoutExpiredEvent:
      $ref: "./schemas/socket-server.yaml#/ReadyTimeoutExpiredEvent"
    ReadyTimeoutCanceledEvent:
      $ref: "./schemas/socket-server.yaml#/ReadyTimeoutCanceledEvent"
    PlayingEvent:
      $ref: "./schemas/socket-server.yaml#/PlayingEvent"
    TurnTimeoutStartedEvent:
      $ref: "./schemas/socket-server.yaml#/TurnTimeoutStartedEvent"
    MoveMadeEvent:
      $ref: "./schemas/socket-server.yaml#/MoveMadeEvent"
    NextTurnEvent:
      $ref: "./schemas/socket-server.yaml#/NextTurnEvent"
    GameOverEvent:
      $ref: "./schemas/socket-server.yaml#/GameOverEvent"
    PlayerLeftEvent:
      $ref: "./schemas/socket-server.yaml#/PlayerLeftEvent"
    LeaveSuccessEvent:
      $ref: "./schemas/socket-server.yaml#/LeaveSuccessEvent"
    SocketErrorEvent:
      $ref: "./schemas/socket-server.yaml#/SocketErrorEvent"
