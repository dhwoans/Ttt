PlayerData:
  type: object
  required:
    - userId
    - nickname
    - isReady
  properties:
    userId:
      type: string
      description: 플레이어 식별 ID
    nickname:
      type: string
    isReady:
      type: boolean
    avatar:
      type: string
      description: "아바타 키 (예: cat, dog)"
    skilled:
      type: boolean
