post:
  operationId: issueTicket
  summary: 게임 서버 입장 티켓 발급
  description: |
    게임 서버에 입장하기 위한 일회용 티켓을 발급받습니다.
    발급받은 `ticket` 은 Socket.IO 연결 시 `auth.ticket` 으로 사용하며,
    `ttl` 초 이내에 반드시 소켓 연결을 완료해야 합니다.
  tags:
    - Auth
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../schemas/rest.yaml#/IssueTicketRequest"
        examples:
          basic:
            summary: 기본 요청
            value:
              userId: user-123
              nickname: 홍길동
          with_avatar:
            summary: 아바타 포함 요청
            value:
              userId: user-456
              nickname: 고수
              avatar: cat
              skilled: true
  responses:
    "200":
      description: 티켓 발급 성공
      content:
        application/json:
          schema:
            $ref: "../schemas/rest.yaml#/IssueTicketResponse"
          example:
            success: true
            gameServerUrl: ws://localhost:8080
            ticket: a1b2c3d4-e5f6-7890-abcd-ef1234567890
            ttl: 30
    "400":
      description: 요청 파라미터 오류 (필수 필드 누락 등)
      content:
        application/json:
          schema:
            $ref: "../schemas/rest.yaml#/ApiErrorResponse"
          example:
            success: false
            message: 필수 필드가 누락되었습니다.
            code: MISSING_FIELDS
            missingFields:
              - userId
              - nickname
    "500":
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: "../schemas/rest.yaml#/ApiErrorResponse"
          example:
            success: false
            message: 서버 오류가 발생했습니다.
            code: INTERNAL_SERVER_ERROR
