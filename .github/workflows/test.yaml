name: Test

on:
  push:
    branches:
      - master
      - feature/29-monorepo
      - "test/*"
      - "feat/*"
      - "fix/*"
      - "design/*"
      - "infra/*"
      - "refactor/*"
      - "docs/*"
      - "chore/*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Run tests with Turborepo
        run: pnpm test
