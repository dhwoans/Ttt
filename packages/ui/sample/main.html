<html lang="en" vid="0">
  <head vid="1">
    <meta charset="UTF-8" vid="2" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
      vid="3"
    />
    <title vid="4">BLITZ BLOKS // AUTHENTICATION</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" vid="5" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin=""
      vid="6"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&amp;family=Inter:wght@400;900&amp;display=swap"
      rel="stylesheet"
      vid="7"
    />
    <style vid="8">
      :root {
        --orange: #ff5e2a;
        --pink: #e3a6c4;
        --yellow: #e9e65d;
        --teal: #266070;
        --olive: #4a4e27;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-font-smoothing: antialiased;
      }

      body {
        background-color: var(--teal);
        font-family: "Inter", sans-serif;
        color: white;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: crosshair;
      }

      .blitz-type {
        font-family: "Archivo Black", sans-serif;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -0.08em;
        line-height: 0.85;
      }

      .login-container {
        width: 100%;
        max-width: 500px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 10;
      }

      .logo-section h1 {
        font-size: 8rem;
        color: var(--yellow);
        margin-bottom: 50px;
        text-shadow: 8px 8px 0px var(--orange);
        transform: rotate(-2deg);
      }

      .input-stack {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-bottom: 30px;
      }

      .auth-input {
        width: 100%;
        background: var(--olive);
        border: 4px solid var(--pink);
        padding: 20px;
        font-family: "Archivo Black", sans-serif;
        font-size: 1.2rem;
        color: var(--yellow);
        outline: none;
        text-transform: uppercase;
      }

      .auth-input::placeholder {
        color: rgba(233, 230, 93, 0.4);
      }

      .auth-input:focus {
        background: #5a5f30;
        border-color: var(--yellow);
      }

      .cta-button {
        background: var(--orange);
        color: white;
        padding: 25px 50px;
        border: 4px solid var(--olive);
        font-size: 2.5rem;
        cursor: pointer;
        box-shadow: 10px 10px 0px var(--yellow);
        width: 100%;
        transition: all 0.1s;
      }

      .cta-button:active {
        transform: translate(5px, 5px);
        box-shadow: 5px 5px 0px var(--yellow);
      }

      .noise {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1000;
        pointer-events: none;
        opacity: 0.04;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      .footer-info {
        position: absolute;
        bottom: 40px;
        width: 100%;
        display: flex;
        justify-content: space-between;
        padding: 0 60px;
        color: var(--pink);
        font-weight: 900;
        font-size: 0.8rem;
      }

      .bg-stripe {
        position: absolute;
        width: 100%;
        height: 30%;
        background: var(--pink);
        top: 50%;
        transform: translateY(-50%) skewY(-5deg);
        z-index: 0;
      }
    </style>
  </head>
  <body vid="9">
    <div class="noise" vid="10"></div>
    <div class="bg-stripe" vid="11"></div>

    <main class="login-container" vid="12">
      <div class="logo-section" vid="13">
        <h1 class="blitz-type" vid="14">BLITZ<br vid="15" />BLOKS</h1>
      </div>

      <form class="input-stack" onsubmit="event.preventDefault()" vid="16">
        <input
          type="text"
          class="auth-input"
          placeholder="USER_IDENTIFIER_"
          vid="17"
        />
        <input
          type="password"
          class="auth-input"
          placeholder="ACCESS_KEY_"
          vid="18"
        />

        <button type="submit" class="blitz-type cta-button" vid="19">
          INIT_UPLINK
        </button>
      </form>

      <div
        class="blitz-type"
        style="color: var(--yellow); font-size: 0.9rem; margin-top: 10px"
        vid="20"
      >
        &gt; WAITING FOR CREDENTIALS...
      </div>
    </main>

    <div class="footer-info" vid="21">
      <div class="blitz-type" vid="22">LOC: BERLIN_NODE_01</div>
      <div class="blitz-type" vid="23">SYSTEM_ENCRYPTION: AES_256_V4</div>
    </div>

    <script vid="24">
      const btn = document.querySelector(".cta-button");
      btn.addEventListener("mouseenter", () => {
        btn.style.transform = "scale(1.02) rotate(1deg)";
      });
      btn.addEventListener("mouseleave", () => {
        btn.style.transform = "scale(1) rotate(0deg)";
      });
    </script>
  </body>
</html>
