# Socket.IO Server → Client 이벤트 페이로드

ConnectedEvent:
  description: |
    `socket.on("CONNECTED", handler)`
    소켓 연결 성공 시 발생. 이후 ROOM_ASSIGNED 대기.
  type: object
  required:
    - success
    - socketId
    - message
  properties:
    success:
      type: boolean
      enum: [true]
    socketId:
      type: string
    message:
      type: string

RoomAssignedEvent:
  description: |
    `socket.on("ROOM_ASSIGNED", handler)`
    방이 할당되었을 때 발생.
  type: object
  required:
    - roomId
  properties:
    roomId:
      type: string

ExistingPlayersEvent:
  description: |
    `socket.on("EXISTING_PLAYERS", handler)`
    새로 입장한 플레이어에게만 발송. 방에 이미 있는 플레이어 목록.
  type: object
  required:
    - players
    - roomId
  properties:
    players:
      type: array
      items:
        $ref: "./common.yaml#/PlayerData"
    roomId:
      type: string

PlayerJoinedEvent:
  description: |
    `socket.on("PLAYER_JOINED", handler)`
    기존 플레이어들에게만 발송. 새 플레이어 입장 알림.
  type: object
  required:
    - player
    - roomId
  properties:
    player:
      $ref: "./common.yaml#/PlayerData"
    roomId:
      type: string

PlayerReadyEvent:
  description: |
    `socket.on("PLAYER_READY", handler)`
    방 전체 브로드캐스트. 플레이어 준비 상태 변경 알림.
  type: object
  required:
    - userId
    - nickname
    - isReady
    - roomId
  properties:
    userId:
      type: string
    nickname:
      type: string
    avatar:
      type: string
    isReady:
      type: boolean
    roomId:
      type: string

ReadyTimeoutStartedEvent:
  description: |
    `socket.on("READY_TIMEOUT_STARTED", handler)`
    방 정원이 찼지만 전원 READY가 아닐 때 카운트다운 시작.
  type: object
  required:
    - roomId
    - timeoutMs
  properties:
    roomId:
      type: string
    timeoutMs:
      type: integer
      description: 타임아웃 밀리초

ReadyTimeoutExpiredEvent:
  description: |
    `socket.on("READY_TIMEOUT_EXPIRED", handler)`
    READY 타임아웃 만료 — 미준비 플레이어가 방에서 제거됨.
  type: object
  required:
    - roomId
    - userId
    - message
  properties:
    roomId:
      type: string
    userId:
      type: string
      description: 타임아웃으로 제거된 플레이어 ID
    message:
      type: string

ReadyTimeoutCanceledEvent:
  description: |
    `socket.on("READY_TIMEOUT_CANCELED", handler)`
    진행 중이던 READY 타임아웃이 중단됨.
  type: object
  required:
    - roomId
    - reason
  properties:
    roomId:
      type: string
    reason:
      type: string
      enum:
        - ROOM_NOT_FULL
        - ALL_READY
        - ROOM_UNAVAILABLE

PlayingEvent:
  description: |
    `socket.on("PLAYING", handler)`
    모든 플레이어 ready=true 시 게임 시작. 첫 턴 플레이어 정보 포함.
  type: object
  required:
    - roomId
    - status
    - currentTurnPlayerId
    - players
  properties:
    roomId:
      type: string
    status:
      type: string
      enum: [PLAYING]
    currentTurnPlayerId:
      type: string
      description: 첫 턴을 진행할 플레이어 ID
    players:
      type: array
      items:
        type: string
      minItems: 2
      maxItems: 2
      description: 게임 참가 플레이어 ID 배열 [player1, player2]

TurnTimeoutStartedEvent:
  description: |
    `socket.on("TURN_TIMEOUT_STARTED", handler)`
    현재 턴 플레이어의 착수 제한시간 카운트다운 시작.
  type: object
  required:
    - roomId
    - timeoutMs
    - currentTurnPlayerId
  properties:
    roomId:
      type: string
    timeoutMs:
      type: integer
    currentTurnPlayerId:
      type: string

MoveMadeEvent:
  description: |
    `socket.on("MOVE_MADE", handler)`
    방 전체 브로드캐스트. 플레이어가 수를 놓았을 때 발생.
  type: object
  required:
    - userId
    - move
  properties:
    userId:
      type: string
      description: 수를 놓은 플레이어의 userId
    move:
      type: integer
      minimum: 0
      maximum: 8
    isAuto:
      type: boolean
      description: 서버 타임아웃에 의해 자동 착수된 경우 true

NextTurnEvent:
  description: |
    `socket.on("NEXT_TURN", handler)`
    방 전체 브로드캐스트. 다음 턴 플레이어가 정해졌을 때 발생.
  type: object
  required:
    - roomId
    - currentTurn
    - nextPlayerId
  properties:
    roomId:
      type: string
    currentTurn:
      type: integer
      description: 턴 카운트 (0부터 증가)
    nextPlayerId:
      type: string

GameOverEvent:
  description: |
    `socket.on("GAME_OVER", handler)`
    방 전체 브로드캐스트. 게임 종료 시 발생.
  type: object
  required:
    - roomId
    - result
    - winner
    - winnerIndex
    - board
  properties:
    roomId:
      type: string
    result:
      type: string
      enum:
        - win
        - draw
    winner:
      type: string
      nullable: true
      description: 승자 userId (무승부 시 null)
    winnerIndex:
      type: integer
      description: 승자의 플레이어 인덱스
    board:
      type: array
      items:
        type: string
      minItems: 9
      maxItems: 9
      description: 최종 보드 상태 (각 칸에 플레이어 ID 또는 빈 문자열)

PlayerLeftEvent:
  description: |
    `socket.on("PLAYER_LEFT", handler)`
    같은 방의 다른 플레이어들에게만 발송. 플레이어 퇴장 알림.
  type: object
  required:
    - userId
    - nickname
    - roomId
  properties:
    userId:
      type: string
    nickname:
      type: string
    avatar:
      type: string
    roomId:
      type: string

LeaveSuccessEvent:
  description: |
    `socket.on("LEAVE_SUCCESS", handler)`
    나간 본인에게만 발송. 방 퇴장 성공 확인.
  type: object
  required:
    - success
    - message
  properties:
    success:
      type: boolean
      enum: [true]
    message:
      type: string

SocketErrorEvent:
  description: |
    `socket.on("ERROR", handler)`
    에러 발생 시 해당 소켓에 발송.
  type: object
  required:
    - message
  properties:
    message:
      type: string
    roomId:
      type: string
