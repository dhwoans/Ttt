openapi: 3.1.0

info:
  title: TicTacToe Game API
  version: 1.0.0
  description: |
    틱택토 게임 서버 API 명세서.

    ## 인증 흐름
    1. `POST /api/ticket` 으로 티켓 발급
    2. 발급받은 `ticket` 을 Socket.IO 연결 시 `auth.ticket` 으로 전달
    3. `ttl` 초 이내에 소켓 연결 완료 필요

servers:
  - url: http://localhost:3000
    description: 로컬 개발 서버

paths:
  /api/ticket:
    $ref: "./paths/ticket.yaml"

components:
  schemas:
    IssueTicketRequest:
      $ref: "./schemas/rest.yaml#/IssueTicketRequest"
    IssueTicketResponse:
      $ref: "./schemas/rest.yaml#/IssueTicketResponse"
    ApiErrorResponse:
      $ref: "./schemas/rest.yaml#/ApiErrorResponse"
