# Socket.IO Client → Server 이벤트 페이로드

ReadyEventPayload:
  description: |
    `socket.emit("READY", payload)`
    플레이어 준비 상태 변경. 모든 플레이어가 ready=true 되면 게임 자동 시작.
  type: object
  required:
    - isReady
  properties:
    isReady:
      type: boolean
      description: "true: 준비 완료, false: 준비 취소"

MoveEventPayload:
  description: |
    `socket.emit("MOVE", payload)`
    틱택토 보드에 수를 놓습니다.
    ```
    0 | 1 | 2
    ---------
    3 | 4 | 5
    ---------
    6 | 7 | 8
    ```
  type: object
  required:
    - move
  properties:
    move:
      type: integer
      minimum: 0
      maximum: 8
      description: 놓을 위치 인덱스 (0-8)

# LeaveEventPayload 는 빈 객체이므로 별도 스키마 없음
# socket.emit("LEAVE") — payload 없음
